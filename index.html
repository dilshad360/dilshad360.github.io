<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Mohamed Dilshad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0e0e0e;
            --fg: #f1f1f1;
            --muted: #818181;
        }

        html,
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0;
            letter-spacing: 0.01em;
            min-height: 100vh;
            scroll-behavior: smooth;
            line-height: 1.8;
        }

        .container {
            max-width: 720px;
            margin: 64px auto;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 36px 40px;
            border: none;
        }

        h1,
        h2 {
            color: var(--fg);
            margin-bottom: 0.5em;
            font-weight: 600;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.65em;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 3em;
            margin-bottom: 1.2em;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.45em;
        }

        .contact-links {
            margin: 0.6em 0 2.8em 0;
            font-size: 1rem;
            line-height: 1.7;
        }

        .contact-links a {
            color: var(--fg);
            text-decoration: none;
            margin-right: 1.5em;
            font-weight: 600;
            transition: color 0.2s;
        }

        .contact-links a:hover {
            text-decoration: underline;
        }

        .section {
            margin-bottom: 2.4em;
        }

        .job-role {
            font-weight: 600;
            color: var(--fg);
            font-size: 1.03rem;
            margin-bottom: 0.18em;
        }

        .job-info {
            color: var(--muted);
            font-size: 0.98em;
            margin-bottom: 0.5em;
        }

        ul {
            padding-left: 1.5em;
        }

        li {
            margin-bottom: 0.75em;
            line-height: 1.75em;
        }

        .skills-list,
        .languages-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9em 2em;
            margin: 0;
            padding: 0;
            list-style: none;
            color: var(--fg);
        }

        .skills-list li,
        .languages-list li {
            background: transparent;
            border-radius: 0;
            padding: 0.4em 0.95em;
            font-size: 1.01rem;
            color: var(--fg);
            letter-spacing: 0.02em;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Mohamed Dilshad</h1>
        <div class="contact-links">
            <span>Software Engineer</span><br />
            <a href="mailto:dilshad360.dev@gmail.com">dilshad360.dev@gmail.com</a>
            <a href="https://linkedin.com/in/dilshad360">LinkedIn</a>
            <a href="https://github.com/dilshad360">GitHub</a>
        </div>
    </div>
</body>

</html>
